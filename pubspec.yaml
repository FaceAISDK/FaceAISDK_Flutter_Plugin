name: face_aisdk_flutter_plugin
description: A Flutter plugin for FaceAISDK offline face recognition.
version: 0.0.1+1
homepage: https://github.com/FaceAISDK/FaceAISDK_Flutter_Plugin

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.faceaisdk.flutter
        pluginClass: FaceAiSdkPlugin
      ios:
        pluginClass: FaceAiSdkPlugin
